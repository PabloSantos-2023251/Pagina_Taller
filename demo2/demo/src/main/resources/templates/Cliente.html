<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión | Clientes</title>
    <link rel="stylesheet" th:href="@{/css/clientes.css}">
</head>
<body>

<header class="navbar">
    <div class="nav-left">
        <div class="profile-container">
            <img th:src="${session.rol == 'Administrador' ? '/img/admin-avatar.png' : '/img/user-avatar.png'}"
                 alt="Perfil" class="profile-pic">
        </div>
        <div class="logo">TIENDA<span>PRO</span></div>
    </div>

    <a th:href="@{/home}">Inicio</a>

</header>


<main class="main-content">

    <div th:if="${mensajeError}" class="toast-error">
        <div class="toast-body">
            <strong>Error de Sistema:</strong> <span th:text="${mensajeError}"></span>
        </div>
        <a th:href="@{/clientes}" class="toast-close">&times;</a>
    </div>

    <div class="dashboard-grid">

        <section class="glass-card form-section">
            <header class="section-header">
                <h2 th:text="${editando} ? 'Actualizar Cliente' : 'Nuevo Cliente'"></h2>
                <p>Complete los datos para la gestión del registro.</p>
            </header>

            <form th:action="@{/clientes/guardar}" th:object="${clienteObj}" method="post" class="stack-form">
                <div class="input-row">
                    <div class="input-group">
                        <label>DPI del Cliente</label>
                        <input type="number" th:field="*{dpiCliente}" th:readonly="${editando}" required>
                    </div>
                    <div class="input-group">
                        <label>Estado</label>
                        <select th:field="*{estado}">
                            <option value="1">Activo</option>
                            <option value="0">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Nombre(s)</label>
                        <input type="text" th:field="*{nombre_cliente}" required>
                    </div>
                    <div class="input-group">
                        <label>Apellido(s)</label>
                        <input type="text" th:field="*{apellido_cliente}" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Dirección Completa</label>
                    <input type="text" th:field="*{direccion}">
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn-save" th:text="${editando} ? 'Guardar Cambios' : 'Registrar Cliente'"></button>
                    <a th:if="${editando}" th:href="@{/clientes}" class="btn-cancel">Cancelar</a>
                </div>
            </form>
        </section>

        <section class="glass-card table-section">
            <div class="table-header">
                <h3>Registros Existentes</h3>
                <form th:action="@{/clientes}" method="get" class="mini-search">
                    <input type="text" name="buscar" placeholder="🔍 Filtrar por nombre...">
                </form>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>DPI</th>
                        <th>Cliente</th>
                        <th>Estado</th>
                        <th class="text-right">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${clientes}">
                        <td class="col-id" th:text="${c.dpiCliente}"></td>
                        <td>
                            <div class="client-info">
                                <span class="full-name" th:text="${c.nombre_cliente + ' ' + c.apellido_cliente}"></span>
                                <span class="sub-text" th:text="${c.direccion}"></span>
                            </div>
                        </td>
                        <td>
                                <span th:class="${c.estado == 1 ? 'badge-ok' : 'badge-no'}"
                                      th:text="${c.estado == 1 ? 'Activo' : 'Inactivo'}"></span>
                        </td>
                        <td class="text-right actions-cell">
                            <a th:href="@{/clientes/editar/{id}(id=${c.dpiCliente})}" class="btn-icon edit">✏️</a>
                            <a th:href="@{/clientes/eliminar/{id}(id=${c.dpiCliente})}"
                               class="btn-icon delete" onclick="return confirm('¿Eliminar registro?')">🗑️</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>
</body>
</html>
