<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Clientes</title>
    <link rel="stylesheet" th:href="@{/css/clientes.css}">
</head>
<body>

<header class="navbar">
    <div class="logo">MiSistema v1.0</div>
    <div class="user-info">
        <a th:href="@{/home}" class="btn-logout">Volver</a>
    </div>
</header>

<main class="container">

    <div style="background: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px;">
        <h2 th:text="${editando} ? 'Modificar Cliente' : 'Registrar Nuevo Cliente'"></h2>
        <form th:action="@{/clientes/guardar}" th:object="${clienteObj}" method="post">
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="number" th:field="*{dpiCliente}" placeholder="DPI" required th:readonly="${editando}">
                <input type="text" th:field="*{nombre_cliente}" placeholder="Nombre" required>
                <input type="text" th:field="*{apellido_cliente}" placeholder="Apellido" required>
                <input type="text" th:field="*{direccion}" placeholder="Dirección">
                <select th:field="*{estado}">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>
                <button type="submit" class="btn-nuevo" style="background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer;">Aceptar</button>
                <a th:if="${editando}" th:href="@{/clientes}" style="color: red; text-decoration: none; align-self: center;">Cancelar</a>
            </div>
        </form>
    </div>

    <div style="margin-bottom: 20px;">
        <form th:action="@{/clientes}" method="get" style="display: flex; gap: 10px;">
            <input type="text" name="buscar" placeholder="Buscar por nombre o DPI..." style="flex-grow: 1; padding: 8px;">
            <button type="submit">Buscar</button>
            <a th:href="@{/clientes}" style="padding-top: 8px;">Limpiar</a>
        </form>
    </div>

    <div class="table-container">
        <table border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead style="background: #333; color: white;">
            <tr>
                <th>DPI</th>
                <th>Nombre Completo</th>
                <th>Dirección</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${clientes}">
                <td th:text="${c.dpiCliente}"></td>
                <td th:text="${c.nombre_cliente + ' ' + c.apellido_cliente}"></td>
                <td th:text="${c.direccion}"></td>
                <td>
                    <span th:text="${c.estado == 1 ? 'Activo' : 'Inactivo'}"
                          th:style="${c.estado == 1 ? 'color: green; font-weight: bold;' : 'color: red;'}"></span>
                </td>
                <td>
                    <a th:href="@{/clientes/editar/{id}(id=${c.dpiCliente})}" style="text-decoration: none; margin-right: 10px;">✏️ Editar</a>
                    <a th:href="@{/clientes/eliminar/{id}(id=${c.dpiCliente})}"
                       onclick="return confirm('¿Desea eliminar este registro?')" style="text-decoration: none; color: red;">🗑️ Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
