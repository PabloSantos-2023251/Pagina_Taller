<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Clientes - MiSistema</title>
    <link rel="stylesheet" th:href="@{/css/clientes.css}">
</head>
<body>

<header class="navbar">
    <div class="logo">MiSistema v1.0</div>
    <div class="user-info">
        <span>Bienvenido, <strong>Administrador</strong></span>
        <a th:href="@{/home}" class="btn-logout">Volver</a>
    </div>
</header>

<main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>Listado de Clientes</h1>
        <button class="btn-nuevo" type="button">+ Nuevo Registro</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>DPI</th>
                <th>Nombre Completo</th>
                <th>Dirección</th>
                <th>Estado</th>
                <th style="text-align: center;">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cliente : ${clientes}">
                <td th:text="${cliente.dpiCliente}"></td>
                <td th:text="${cliente.nombre_cliente + ' ' + cliente.apellido_cliente}"></td>
                <td th:text="${cliente.direccion}"></td>
                <td>
                    <span th:if="${cliente.estado == 1}" class="status-pill status-active">Activo</span>
                    <span th:unless="${cliente.estado == 1}" class="status-pill status-inactive">Inactivo</span>
                </td>
                <td style="text-align: center;">
                    <span style="cursor:pointer; margin: 0 5px;">✏️</span>
                    <span style="cursor:pointer; margin: 0 5px;">🗑️</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
