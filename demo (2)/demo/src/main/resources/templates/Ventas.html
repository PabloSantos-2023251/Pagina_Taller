<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ventas</title>
    <link rel="stylesheet" th:href="@{/css/clientes.css}">
</head>
<body>

<header class="navbar">
    <div class="nav-left">
        <div class="profile-container">
            <img th:src="${session.rol == 'Administrador' ? '/img/admin-avatar.png' : '/img/user-avatar.png'}"
                 alt="Perfil" class="profile-pic">
        </div>
        <div class="logo">TIENDA<span>PRO</span></div>
    </div>

    <a th:href="@{/home}">Inicio</a>

</header>

<main class="main-content">
    <div th:if="${mensajeError}" class="toast-error" style="background: rgba(255,0,0,0.1); color: red; padding: 10px; border-radius: 5px; margin-bottom: 10px;">
        <span th:text="${mensajeError}"></span>
    </div>

    <div class="dashboard-grid">
        <section class="glass-card form-section">
            <header class="section-header">
                <h2 th:text="${editando} ? 'Editar Venta' : 'Nueva Venta'"></h2>
            </header>

            <form th:action="@{/ventas/guardar}" th:object="${ventaObj}" method="post" class="stack-form">
                <div class="input-row">
                    <div class="input-group">
                        <label>Código Venta</label>
                        <input type="number" th:field="*{codigoVenta}" th:readonly="${editando}" required>
                    </div>
                    <div class="input-group">
                        <label>Fecha</label>
                        <input type="date" th:field="*{fecha_venta}" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Cliente</label>
                    <select name="clienteId" required>
                        <option value="">-- Seleccione Cliente --</option>
                        <option th:each="c : ${clientes}"
                                th:value="${c.dpiCliente}"
                                th:text="${c.nombre_cliente + ' ' + c.apellido_cliente}"
                                th:selected="${ventaObj.cliente != null and ventaObj.cliente.dpiCliente == c.dpiCliente}">
                        </option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Vendedor</label>
                    <select name="usuarioId" required>
                        <option value="">-- Seleccione Vendedor --</option>
                        <option th:each="u : ${usuarios}"
                                th:value="${u.codigoUsuario}"
                                th:text="${u.username}"
                                th:selected="${ventaObj.usuario != null and ventaObj.usuario.codigoUsuario == u.codigoUsuario}">
                        </option>
                    </select>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Total (Q)</label>
                        <input type="number" step="0.01" th:field="*{total}" required>
                    </div>
                    <div class="input-group">
                        <label>Estado</label>
                        <select th:field="*{estado}">
                            <option value="1">Activo</option>
                            <option value="0">Anulado</option>
                        </select>
                    </div>
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn-save" th:text="${editando} ? 'Guardar' : 'Registrar'"></button>
                    <a th:if="${editando}" th:href="@{/ventas}" class="btn-cancel">Cancelar</a>
                </div>
            </form>
        </section>

        <section class="glass-card table-section">
            <div class="table-header">
                <h3>Registros</h3>
                <form th:action="@{/ventas}" method="get" class="mini-search">
                    <input type="text" name="buscar" placeholder="🔍 Buscar..." th:value="${buscar}">
                </form>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="v : ${ventas}">
                        <td th:text="${v.codigoVenta}"></td>
                        <td th:text="${v.fecha_venta}"></td>
                        <td th:text="${v.cliente?.nombre_cliente + ' ' + v.cliente?.apellido_cliente}"></td>
                        <td th:text="${'Q' + #numbers.formatDecimal(v.total, 1, 2)}"></td>
                        <td>
                            <span th:class="${v.estado == 1 ? 'badge-ok' : 'badge-no'}" th:text="${v.estado == 1 ? 'Activo' : 'Anulado'}"></span>
                        </td>
                        <td class="text-right">
                            <div th:if="${session.rol == 'Administrador' or (v.usuario != null and v.usuario.codigoUsuario == session.usuarioId)}">
                                <a th:href="@{/ventas/editar/{id}(id=${v.codigoVenta})}" class="btn-icon">✏️</a>

                                <a th:if="${session.rol == 'Administrador'}"
                                   th:href="@{/ventas/eliminar/{id}(id=${v.codigoVenta})}"
                                   class="btn-icon"
                                   onclick="return confirm('¿Eliminar?')">🗑️</a>
                            </div>
                            <span th:unless="${session.rol == 'Administrador' or (v.usuario != null and v.usuario.codigoUsuario == session.usuarioId)}">
                        Sin permisos
                        </span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>
</body>
</html>
