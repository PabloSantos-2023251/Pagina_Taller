<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario | TIENDAPRO</title>
    <link rel="stylesheet" th:href="@{/css/clientes.css}">
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <div class="profile-container">
            <img th:src="${session.rol == 'Administrador' ? '/img/admin-avatar.png' : '/img/user-avatar.png'}"
                 alt="Perfil" class="profile-pic">
        </div>
        <div class="logo">TIENDA<span>PRO</span></div>
    </div>

    <a th:href="@{/home}">Inicio</a>

</header>
<main class="main-content">
    <div th:if="${mensajeError}" class="toast-error">
        <div class="toast-body">
            <strong>Aviso:</strong> <span th:text="${mensajeError}"></span>
        </div>
        <a th:href="@{/productos}" class="toast-close">&times;</a>
    </div>
    <div class="dashboard-grid">
        <section class="glass-card form-section">
            <header class="section-header">
                <h2 th:text="${editando} ? 'Editar Producto' : 'Nuevo Producto'"></h2>
            </header>
            <form th:action="@{/productos/guardar}" th:object="${productoObj}" method="post" class="stack-form">
                <div class="input-row">
                    <div class="input-group"><label>Código</label><input type="number" th:field="*{codigoProducto}" th:readonly="${editando}" required></div>
                    <div class="input-group"><label>Estado</label>
                        <select th:field="*{estado}"><option value="1">Activo</option><option value="0">Inactivo</option></select>
                    </div>
                </div>
                <div class="input-group"><label>Nombre</label><input type="text" th:field="*{nombre_producto}" required></div>
                <div class="input-row">
                    <div class="input-group"><label>Precio (Q)</label><input type="number" step="0.01" th:field="*{precio}" required></div>
                    <div class="input-group"><label>Stock</label><input type="number" th:field="*{stock}" required></div>
                </div>
                <div class="form-footer">
                    <button type="submit" class="btn-save" th:text="${editando} ? 'Actualizar' : 'Guardar'"></button>
                    <a th:if="${editando}" th:href="@{/productos}" class="btn-cancel">Cancelar</a>
                </div>
            </form>
        </section>
        <section class="glass-card table-section">
            <div class="table-header">
                <h3>Stock de Artículos</h3>
                <form th:action="@{/productos}" method="get" class="mini-search">
                    <input type="text" name="buscar" placeholder="🔍 Buscar...">
                </form>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>ID</th><th>Producto</th><th>Precio</th><th>Stock</th><th class="text-right">Acciones</th></tr></thead>
                    <tbody>
                    <tr th:each="p : ${productos}">
                        <td class="col-id" th:text="${p.codigoProducto}"></td>
                        <td class="full-name" th:text="${p.nombre_producto}"></td>
                        <td th:text="'Q' + ${#numbers.formatDecimal(p.precio, 1, 2)}"></td>
                        <td th:text="${p.stock} + ' unds.'"></td>
                        <td class="text-right actions-cell">
                            <a th:href="@{/productos/editar/{id}(id=${p.codigoProducto})}" class="btn-icon edit">✏️</a>
                            <a th:href="@{/productos/eliminar/{id}(id=${p.codigoProducto})}" class="btn-icon delete" onclick="return confirm('¿Eliminar?')">🗑️</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>
</body>
</html>
