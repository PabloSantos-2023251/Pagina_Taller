<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario de Productos - MiSistema</title>
    <link rel="stylesheet" th:href="@{/css/clientes.css}" href="../static/css/clientes.css">
</head>
<body>

<header class="navbar">
    <div class="logo">MiSistema v1.0</div>
    <div class="user-info">
        <span>Bienvenido, <strong>Administrador</strong></span>
        <a th:href="@{/home}" class="btn-logout">Volver</a>
    </div>
</header>

<main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>Control de Inventario</h1>
        <button class="btn-nuevo" type="button">+ Nuevo Producto</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>Código</th>
                <th>Nombre del Producto</th>
                <th>Precio (Q)</th>
                <th>Stock</th>
                <th>Estado</th>
                <th style="text-align: center;">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>501</td>
                <td><strong>Coca-Cola 1.5L</strong></td>
                <td>12.50</td>
                <td>45 unidades</td>
                <td><span class="status-pill status-active">Disponible</span></td>
                <td style="text-align: center;">
                    <span style="cursor:pointer; margin: 0 5px;">✏️</span>
                    <span style="cursor:pointer; margin: 0 5px;">🗑️</span>
                </td>
            </tr>
            <tr>
                <td>502</td>
                <td><strong>Arroz Blanco 1lb</strong></td>
                <td>5.75</td>
                <td>0 unidades</td>
                <td><span class="status-pill status-inactive">Agotado</span></td>
                <td style="text-align: center;">
                    <span style="cursor:pointer; margin: 0 5px;">✏️</span>
                    <span style="cursor:pointer; margin: 0 5px;">🗑️</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
