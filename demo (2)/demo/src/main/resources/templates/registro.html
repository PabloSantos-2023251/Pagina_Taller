<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-wrapper">
    <div class="login-box">
        <h2>Crear Cuenta</h2>
        <form th:action="@{/registro}" method="post">
            <div class="input-group">
                <label>Nombre de Usuario</label>
                <input type="text" name="usuario" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-login" style="background:#28a745">Registrar</button>
        </form>
        <div th:if="${error}" style="color:red; text-align:center; margin-top:10px" th:text="${error}"></div>
        <div style="text-align:center; margin-top:15px">
            <a th:href="@{/usuario}">Ya tengo cuenta</a>
        </div>
    </div>
</div>
</body>
</html>
