<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | Mi App</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-wrapper">
    <div class="login-box">
        <div class="login-header">
            <h2>Crear Cuenta</h2>
            <p>Únete a nuestra plataforma hoy mismo</p>
        </div>

        <form th:action="@{/registro}" method="post">
            <div class="input-group">
                <label>Código (ID)</label>
                <input type="number" name="codigo" placeholder="0000" required>
            </div>

            <div class="input-group">
                <label>Nombre de Usuario</label>
                <input type="text" name="usuario" placeholder="Nombre de usuario" required>
            </div>

            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="Crea una contraseña" required>
            </div>

            <div class="input-group">
                <label>Rol de Acceso</label>
                <select name="rol" required>
                    <option value="" disabled selected>Selecciona un rol</option>
                    <option value="Usuario">Usuario (Vendedor)</option>
                    <option value="Administrador">Administrador</option>
                </select>
            </div>

            <button type="submit" class="btn-login">Finalizar Registro</button>
        </form>

        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <div class="link-footer">
            <a th:href="@{/usuario}">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </div>
</div>
</body>
</html>
