<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-wrapper">
    <div class="login-box">
        <h2>Crear Cuenta</h2>
        <form th:action="@{/registro}" method="post">

            <div class="input-group">
                <label>Código (ID)</label>
                <input type="number" name="codigo" required>
            </div>

            <div class="input-group">
                <label>Nombre de Usuario</label>
                <input type="text" name="usuario" required>
            </div>

            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>

            <div class="input-group">
                <label>Rol de Acceso</label>
                <select name="rol" required style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                    <option value="Usuario">Usuario (Vendedor)</option>
                    <option value="Administrador">Administrador</option>
                </select>
            </div>

            <button type="submit" class="btn-login" style="margin-top: 20px;">Registrarse</button>
        </form>

        <div th:if="${error}" style="color:red; text-align:center; margin-top:10px" th:text="${error}"></div>

        <div style="text-align:center; margin-top:15px">
            <a th:href="@{/usuario}">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </div>
</div>
</body>
</html>
