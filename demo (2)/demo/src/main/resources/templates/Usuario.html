<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - MiSistema</title>
    <link rel="stylesheet" th:href="@{/css/clientes.css}" href="../static/css/clientes.css">
</head>
<body>

<header class="navbar">
    <div class="logo">MiSistema v1.0</div>
    <div class="user-info">
        <span>Bienvenido, <strong>Administrador</strong></span>
        <a th:href="@{/}" class="btn-logout">Volver</a>
    </div>
</header>

<main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>Listado de Usuarios</h1>
        <button class="btn-nuevo" type="button">+ Nuevo Usuario</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>Código</th>
                <th>Username</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
                <th style="text-align: center;">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>101</td>
                <td><strong>admin_pablo</strong></td>
                <td>pablo@sistema.com</td>
                <td>ADMIN</td>
                <td><span class="status-pill status-active">Activo</span></td>
                <td style="text-align: center;">
                    <span style="cursor:pointer; margin: 0 5px;">✏️</span>
                    <span style="cursor:pointer; margin: 0 5px;">🗑️</span>
                </td>
            </tr>
            <tr>
                <td>102</td>
                <td><strong>vendedor_ana</strong></td>
                <td>ana@sistema.com</td>
                <td>USER</td>
                <td><span class="status-pill status-inactive">Inactivo</span></td>
                <td style="text-align: center;">
                    <span style="cursor:pointer; margin: 0 5px;">✏️</span>
                    <span style="cursor:pointer; margin: 0 5px;">🗑️</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
