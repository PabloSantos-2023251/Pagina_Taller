<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión | Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/clientes.css}">
</head>
<body>

<nav class="top-nav">
    <div class="nav-brand">TIENDA<span>PRO</span></div>
    <div class="nav-menu">
        <a th:href="@{/home}">Inicio</a>
    </div>
</nav>

<main class="main-content">

    <!-- Mensaje de error -->
    <div th:if="${mensajeError}" class="toast-error">
        <div class="toast-body">
            <strong>Error de Sistema:</strong> <span th:text="${mensajeError}"></span>
        </div>
        <a th:href="@{/usuarios}" class="toast-close">&times;</a>
    </div>

    <div class="dashboard-grid">

        <!-- FORMULARIO -->
        <section class="glass-card form-section">
            <header class="section-header">
                <h2 th:text="${editando} ? 'Actualizar Usuario' : 'Nuevo Usuario'"></h2>
                <p>Complete los datos para la gestión del registro.</p>
            </header>

            <form th:action="@{/usuarios/guardar}" th:object="${usuarioObj}" method="post" class="stack-form">

                <div class="input-row">
                    <div class="input-group">
                        <label>Código de Usuario</label>
                        <input type="number" th:field="*{codigoUsuario}" th:readonly="${editando}" required>
                    </div>
                    <div class="input-group">
                        <label>Estado</label>
                        <select th:field="*{estado}">
                            <option value="1">Activo</option>
                            <option value="0">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" th:field="*{username}" required>
                    </div>
                    <div class="input-group">
                        <label>Rol</label>
                        <select th:field="*{rol}">
                            <option value="Administrador">Administrador</option>
                            <option value="Vendedor">Vendedor</option>
                            <option value="Inventario">Inventario</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" required>
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn-save"
                            th:text="${editando} ? 'Guardar Cambios' : 'Registrar Usuario'">
                    </button>
                    <a th:if="${editando}" th:href="@{/usuarios}" class="btn-cancel">Cancelar</a>
                </div>
            </form>
        </section>

        <!-- TABLA -->
        <section class="glass-card table-section">
            <div class="table-header">
                <h3>Registros Existentes</h3>
                <form th:action="@{/usuarios}" method="get" class="mini-search">
                    <input type="text" name="buscar"
                           placeholder="🔍 Filtrar por usuario, email o rol..."
                           th:value="${buscar}">
                </form>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th class="text-right">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td class="col-id" th:text="${u.codigoUsuario}"></td>
                        <td>
                            <div class="client-info">
                                <span class="full-name" th:text="${u.username}"></span>
                                <span class="sub-text" th:text="${u.email}"></span>
                            </div>
                        </td>
                        <td th:text="${u.rol}"></td>
                        <td>
                            <span th:class="${u.estado == 1 ? 'badge-ok' : 'badge-no'}"
                                  th:text="${u.estado == 1 ? 'Activo' : 'Inactivo'}">
                            </span>
                        </td>
                        <td class="text-right actions-cell">
                            <a th:href="@{/usuarios/editar/{id}(id=${u.codigoUsuario})}" class="btn-icon edit">✏️</a>
                            <a th:href="@{/usuarios/eliminar/{id}(id=${u.codigoUsuario})}"
                               class="btn-icon delete"
                               onclick="return confirm('¿Eliminar este usuario?')">🗑️</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </div>
</main>
</body>
</html>
