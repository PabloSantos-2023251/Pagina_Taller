<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Principal - Sistema</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>

<header class="navbar">
    <div class="logo">MiSistema v1.0</div>
    <div class="user-info">
        Bienvenido, <span th:text="${session.usuarioLogueado}">Admin</span>
        <a th:href="@{/logout}" class="btn-logout">Cerrar Sesión</a>
    </div>
</header>

<main class="container">
    <h1>Panel de Control</h1>
    <div class="grid-menu">

        <a href="/clientes" class="card">
            <div class="card-icon">👥</div>
            <h3>Clientes</h3>
            <p>Gestionar base de datos de clientes.</p>
        </a>

        <a href="/detalles" class="card">
            <div class="card-icon">📋</div>
            <h3>Detalles de Venta</h3>
            <p>Ver desglose de transacciones.</p>
        </a>

        <a href="/ventas" class="card">
            <div class="card-icon">💰</div>
            <h3>Ventas</h3>
            <p>Registro histórico de ventas.</p>
        </a>

        <a href="/productos" class="card">
            <div class="card-icon">📦</div>
            <h3>Productos</h3>
            <p>Control de inventario y stock.</p>
        </a>

    </div>
</main>

</body>
</html>
